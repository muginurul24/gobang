services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: onixggr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onixggr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '${POSTGRES_PORT:-15432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d onixggr']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: onixggr-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-16379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
