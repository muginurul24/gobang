services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: onixggr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: onixggr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '${POSTGRES_PORT:-15432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d onixggr']
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: onixggr-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-16379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

  api:
    profiles: ['app']
    image: docker.io/library/golang:1.26-alpine
    container_name: onixggr-api
    working_dir: /workspace
    command: ['sh', '-c', 'go run ./apps/api']
    environment:
      APP_NAME: onixggr
      APP_ENV: development
      APP_URL: http://localhost:4173
      APP_TIMEZONE: Asia/Jakarta
      APP_LOG_LEVEL: debug
      HTTP_ADDRESS: :8080
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onixggr?sslmode=disable
      REDIS_URL: redis://redis:6379
      GOCACHE: /tmp/onixggr-go-build
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8080:8080'

  web:
    profiles: ['web']
    image: docker.io/library/node:24-alpine
    container_name: onixggr-web
    working_dir: /workspace
    command:
      [
        'sh',
        '-c',
        'npm install && npm --workspace @onixggr/web run dev -- --host 0.0.0.0 --port 4173'
      ]
    environment:
      NODE_ENV: development
    volumes:
      - .:/workspace
    depends_on:
      api:
        condition: service_started
    ports:
      - '4173:4173'

volumes:
  postgres-data:
  redis-data:
